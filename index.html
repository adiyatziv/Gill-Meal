<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>המטבח שלנו — תזונה ו-Meal Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Firebase (compat SDK — simple script-tag usage, no build step needed) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  :root{
    --ink:#16232C;
    --paper:#F2F6F8;
    --paper-2:#E3ECF0;
    --card:#FFFFFF;
    --forest:#1C6E8C;
    --forest-d:#123B4F;
    --ochre:#CC7A3E;
    --ochre-l:#F7E9D9;
    --plum:#A14E77;
    --plum-l:#F7E9F0;
    --steel:#3C8C74;
    --steel-l:#E3F1EC;
    --line:#DCE6EA;
    --good:#2E9B78;
    --bad:#D2694B;
    --radius:22px;
    --radius-sm:14px;
    --shadow-sm:0 2px 10px rgba(18,59,79,.06);
    --shadow-md:0 18px 44px -22px rgba(18,59,79,.30);
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Rubik',sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{ font-family:'Rubik',sans-serif; font-weight:700; margin:0 0 6px; letter-spacing:-.01em; }
  .eyebrow{ font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:#7C8B94; margin-bottom:4px; display:block; }

  header.app{ padding:20px 18px 14px; background:var(--card); color:var(--ink); position:sticky; top:0; z-index:20; box-shadow:var(--shadow-sm); }
  header.app h1{ font-size:21px; color:var(--forest-d); letter-spacing:-.01em; font-weight:800; }
  header.app .sub-row{ display:flex; justify-content:space-between; align-items:center; margin:2px 0 14px; }
  header.app p{ margin:0; font-size:13px; color:#7387A6; }
  header.app .signout{ background:none; border:none; color:#8697A0; font-size:12px; cursor:pointer; text-decoration:underline; }

  nav.tabs{ position:relative; display:flex; gap:2px; overflow-x:auto; background:var(--paper-2); border-radius:999px; padding:4px; scrollbar-width:none; }
  nav.tabs::-webkit-scrollbar{ display:none; }
  .tab-indicator{ position:absolute; top:4px; bottom:4px; background:#fff; border-radius:999px; box-shadow:0 3px 10px rgba(18,59,79,.14); transition:left .32s var(--ease), width .32s var(--ease); }
  nav.tabs button{ position:relative; z-index:1; flex:0 0 auto; background:transparent; border:none; color:#6B808C; padding:9px 15px; font-family:'Rubik',sans-serif; font-size:13.5px; font-weight:600; cursor:pointer; border-radius:999px; transition:color .2s var(--ease); }
  nav.tabs button.active{ color:var(--forest-d); font-weight:700; }
  nav.tabs button:active{ transform:scale(.96); }

  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:30;
    background:var(--card); border-top:1px solid var(--line);
    box-shadow:0 -6px 20px rgba(18,59,79,.08);
    display:flex; justify-content:space-around; align-items:stretch;
    padding-bottom:env(safe-area-inset-bottom, 0);
  }
  .bottom-nav button{
    flex:1; background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:9px 2px 8px; color:#8697A0; font-family:'Rubik',sans-serif;
    font-size:11px; font-weight:600; transition:color .18s var(--ease), transform .12s var(--ease);
  }
  .bottom-nav button .icon{ font-size:20px; line-height:1; }
  .bottom-nav button.active{ color:var(--forest); }
  .bottom-nav button:active{ transform:scale(.94); }
  .gear-btn{ background:none; border:none; font-size:19px; cursor:pointer; color:#6B808C; }
  .sub-toggle{ display:flex; gap:6px; margin-bottom:14px; background:var(--paper-2); border-radius:999px; padding:4px; }
  .sub-toggle button{ flex:1; background:transparent; border:none; border-radius:999px; padding:9px; font-family:'Rubik',sans-serif; font-weight:600; font-size:13.5px; color:#6B808C; cursor:pointer; }
  .sub-toggle button.active{ background:#fff; color:var(--forest-d); box-shadow:0 3px 10px rgba(18,59,79,.12); }

  main{ max-width:760px; margin:0 auto; padding:18px 12px 90px; }
  #main.fade-in{ animation:mainFadeIn .32s var(--ease); }
  @keyframes mainFadeIn{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }

  .card{ background:var(--card); border:1px solid rgba(18,59,79,.05); border-radius:var(--radius); padding:18px; margin-bottom:14px; box-shadow:var(--shadow-sm); }
  .muted{ color:#5F717C; font-size:13px; }

  button{ transition:transform .12s var(--ease), background-color .18s var(--ease), border-color .18s var(--ease), box-shadow .18s var(--ease); }
  button.primary{ background:var(--forest); color:#fff; border:none; padding:13px 18px; border-radius:999px; font-weight:700; cursor:pointer; font-family:'Rubik',sans-serif; font-size:15px; min-height:48px; box-shadow:0 10px 20px -8px rgba(28,110,140,.45); }
  button.primary:active{ transform:scale(.97); }
  button.secondary{ background:#fff; border:1.5px solid var(--forest); color:var(--forest); padding:11.5px 14px; border-radius:999px; font-weight:700; cursor:pointer; font-family:'Rubik',sans-serif; font-size:15px; min-height:48px; }
  button.secondary:active{ transform:scale(.97); background:var(--paper-2); }
  button.ghost{ background:transparent; border:none; color:var(--bad); cursor:pointer; font-size:14px; min-height:32px; opacity:.85; font-weight:600; }
  button.ghost:hover{ opacity:1; text-decoration:underline; }
  button.icon-btn{ background:#fff; border:1.5px solid var(--line); border-radius:999px; width:44px; height:44px; cursor:pointer; font-size:17px; }

  input,select,textarea{ font-family:'Rubik',sans-serif; border:1.5px solid var(--line); border-radius:var(--radius-sm); padding:11px 12px; font-size:16px; background:#FBFDFD; color:var(--ink); width:100%; min-height:46px; transition:border-color .18s var(--ease), box-shadow .18s var(--ease); }
  input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--forest); box-shadow:0 0 0 4px var(--steel-l); }
  textarea{ min-height:unset; }
  label{ font-size:13px; font-weight:600; color:#516069; display:block; margin-bottom:5px; }
  .field{ margin-bottom:13px; }
  .row{ display:flex; gap:8px; }
  .row > *{ flex:1; min-width:0; }

  .macro-pills{ display:flex; gap:6px; flex-wrap:wrap; margin-top:9px; }
  .pill{ border-radius:999px; padding:5px 11px; font-size:12px; font-weight:700; }
  .pill.cal{ background:var(--ochre-l); color:#8A5423; }
  .pill.pro{ background:var(--steel-l); color:#1F6650; }
  .pill.fib{ background:var(--plum-l); color:var(--plum); }

  .tag{ display:inline-block; background:var(--paper-2); border-radius:7px; padding:3px 8px; font-size:11px; font-weight:600; margin-inline-end:5px; margin-top:5px; color:#55636B; }
  .star{ cursor:pointer; font-size:21px; background:none; border:none; color:#CBD5DA; min-height:36px; transition:transform .18s var(--ease), color .18s var(--ease); }
  .star.active{ color:var(--ochre); animation:pop .28s var(--ease); }
  @keyframes pop{ 0%{transform:scale(1);} 45%{transform:scale(1.35);} 100%{transform:scale(1);} }

  .profile-switch{ display:flex; gap:8px; margin-bottom:14px; }
  .profile-switch button{ flex:1; padding:13px; border-radius:var(--radius-sm); border:1.5px solid var(--line); background:#fff; font-weight:700; cursor:pointer; min-height:48px; }
  .profile-switch button.active.A{ border-color:var(--plum); color:var(--plum); background:var(--plum-l); }
  .profile-switch button.active.B{ border-color:var(--steel); color:var(--steel); background:var(--steel-l); }

  .progress-wrap{ margin-bottom:13px; }
  .progress-bar{ height:9px; border-radius:99px; background:var(--paper-2); overflow:hidden; margin-top:4px; }
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--forest), #4FA9C4); border-radius:99px; transition:width .5s var(--ease); }
  .progress-fill.over{ background:linear-gradient(90deg, var(--bad), #E0916F); }

  .shop-item{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--line); font-size:15px; }
  .gemini-log{ background:#FBFDFD; border:1px solid var(--line); border-radius:var(--radius-sm); padding:13px; max-height:340px; overflow-y:auto; margin-bottom:10px; font-size:14px; white-space:pre-wrap; }
  .gemini-msg{ margin-bottom:12px; }
  .empty{ text-align:center; color:#8697A0; padding:34px 10px; font-size:14px; }
  .add-toggle{ margin-bottom:14px; }

  /* --- ingredient cards --- */
  .ing-card{ border:1px solid var(--line); border-radius:var(--radius-sm); padding:12px; margin-bottom:10px; background:#FBFDFD; }
  .ing-card .row{ margin-bottom:8px; }
  .ing-card .row:last-child{ margin-bottom:0; }
  .ing-name-row{ display:flex; gap:6px; align-items:stretch; }
  .ing-name-row input{ flex:1; }
  .off-search-btn{ flex:0 0 48px; background:#fff; border:1.5px solid var(--line); border-radius:var(--radius-sm); cursor:pointer; font-size:17px; min-height:46px; }
  .mini-field{ flex:1; }
  .mini-field label{ font-size:11px; margin-bottom:3px; }
  .off-results{ background:var(--paper-2); border-radius:var(--radius-sm); padding:6px; margin-top:6px; font-size:13px; }
  .off-result-item{ display:flex; justify-content:space-between; align-items:center; gap:8px; padding:8px 6px; border-bottom:1px solid var(--line); }
  .off-result-item:last-child{ border-bottom:none; }
  .off-result-item span{ flex:1; }
  .off-result-item button{ background:var(--forest); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; min-height:36px; }

  .tag-pills{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:9px; }
  .tag-pill{ border:1.5px solid var(--line); background:#fff; border-radius:999px; padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; transition:all .16s var(--ease); }
  .tag-pill.selected{ background:var(--forest); border-color:var(--forest); color:#fff; }
  .tag-add-row{ display:flex; gap:6px; }
  .tag-add-row input{ flex:1; }

  .paste-box{ background:var(--ochre-l); border:1.5px dashed var(--ochre); border-radius:var(--radius-sm); padding:14px; margin-bottom:18px; }
  .paste-box textarea{ min-height:90px; }

  .prep-group{ margin-bottom:16px; }
  .prep-group h4{ font-size:15px; margin:0 0 6px; }
  .prep-item{ display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); }
  .prep-item:last-child{ border-bottom:none; }
  .prep-item.done{ opacity:.6; }
  .prep-item.done .prep-item-title{ text-decoration:line-through; color:#96A3AA; }
  .prep-item input[type=checkbox]{ width:22px; height:22px; flex:0 0 auto; accent-color:var(--forest); }
  .prep-item-title{ font-weight:600; font-size:15px; flex:1; }
  .prep-item-meta{ font-size:12px; color:#8697A0; }

  /* --- recipe grid --- */
  .recipe-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .recipe-card{ background:#fff; border:1px solid var(--line); border-radius:var(--radius-sm); overflow:hidden; cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .15s var(--ease); }
  .recipe-card:active{ transform:scale(.97); }
  .recipe-card .thumb{ width:100%; aspect-ratio:4/3; object-fit:cover; background:var(--paper-2); display:block; }
  .recipe-card .thumb.placeholder{ display:flex; align-items:center; justify-content:center; font-size:30px; }
  .recipe-card .info{ padding:9px 10px 11px; }
  .recipe-card .name{ font-weight:700; font-size:13.5px; line-height:1.3; }
  .recipe-card .meta{ font-size:11px; color:#8697A0; margin-top:3px; }
  .filter-bar{ display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .sort-search-row{ display:flex; gap:8px; }
  .sort-search-row select{ flex:0 0 130px; }

  /* --- recipe detail page --- */
  .detail-header{ display:flex; align-items:center; gap:10px; padding:14px 16px; background:var(--card); position:sticky; top:0; z-index:30; box-shadow:var(--shadow-sm); }
  .detail-header h2{ font-size:16px; margin:0; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .detail-hero{ width:100%; aspect-ratio:16/10; object-fit:cover; background:var(--paper-2); }
  .detail-hero.placeholder{ display:flex; align-items:center; justify-content:center; font-size:60px; }
  .ingredient-row-view{ padding:8px 0; border-bottom:1px dashed var(--line); font-size:14.5px; }
  .instructions-text{ white-space:pre-wrap; line-height:1.7; font-size:15px; }

  /* --- login / setup --- */
  .auth-wrap{ max-width:380px; margin:60px auto; padding:0 16px; }
  .auth-card{ background:#fff; border-radius:var(--radius); box-shadow:var(--shadow-md); padding:26px; }
</style>
</head>
<body>

<div id="app-root"></div>

<script>
/* ============================================================
   FIREBASE SETUP
   ------------------------------------------------------------
   1) Create a free Firebase project at https://console.firebase.google.com
   2) Enable Authentication → Email/Password, and manually add exactly
      the users who should have access (your email + your partner's,
      etc.) — no public sign-up.
   3) Enable Firestore Database (production mode), and set rules like:

        rules_version = '2';
        service cloud.firestore {
          match /databases/{database}/documents {
            function myHousehold() {
              return get(/databases/$(database)/documents/users/$(request.auth.uid)).data.householdId;
            }
            match /users/{uid} {
              allow read, write: if request.auth != null && request.auth.uid == uid;
            }
            match /households/{householdId} {
              allow read, write: if request.auth != null && myHousehold() == householdId;
              match /{document=**} {
                allow read, write: if request.auth != null && myHousehold() == householdId;
              }
            }
          }
        }

      This scopes data by household instead of hardcoded UIDs: each
      user document stores which household they belong to, and every
      household's data (shared state + recipes) lives under
      households/{householdId}/... — anyone whose own user doc points
      at that household can read/write it, and no one else can.
   4) Paste your web app config below instead of the placeholder.
   ============================================================ */
const firebaseConfig = {
  apiKey: "REPLACE_ME",
  authDomain: "REPLACE_ME.firebaseapp.com",
  projectId: "REPLACE_ME",
  storageBucket: "REPLACE_ME.appspot.com",
  messagingSenderId: "REPLACE_ME",
  appId: "REPLACE_ME"
};

const NEEDS_SETUP = firebaseConfig.apiKey === "REPLACE_ME";
let auth = null, db = null;
if(!NEEDS_SETUP){
  firebase.initializeApp(firebaseConfig);
  auth = firebase.auth();
  db = firebase.firestore();
}
const STORAGE_MODE = NEEDS_SETUP ? 'local' : 'firebase';
let currentHouseholdId = null;

/* ============================================================
   CONSTANTS
   ============================================================ */
const MEALS = ['בוקר','צהריים','ערב'];
const DAYS_WEEKDAY = ['ראשון','שני','שלישי','רביעי','חמישי'];
const DAYS_WEEKEND = ['שישי','שבת'];
const DAYS = DAYS_WEEKDAY.concat(DAYS_WEEKEND);
const MEAL_TYPES = ['בוקר','צהריים','ערב','נשנוש','כל סוג'];
const PANTRY_CATEGORIES = ['ירקות ופירות','חלבונים','מוצרי חלב וביצים','יבשים ודגנים','תבלינים ורטבים','קפואים','שימורים ומזווה יבש','אחר'];

/* ============================================================
   STATE
   ============================================================ */
let STATE = null;
let currentUser = null;
let activeTab = 'home';
let planProfile = 'A';
let saveTimer = null;
let unsubState = null, unsubRecipes = null;

function emptySlot(){ return { recipeId:null, variantRecipeId:{A:null,B:null}, portionMultiplier:{A:1,B:1}, prep:'together' }; }

const DEFAULT_STATE = {
  profiles:{
    A:{name:'שלי', goals:{calories:2000,protein:120,fiber:25}},
    B:{name:'בן זוג', goals:{calories:2500,protein:150,fiber:30}}
  },
  customTags:[],
  pantry:[],
  shopChecked:{},
  shopCategoryOverrides:{},
  shopSynonyms:{},
  history:[],
  prepDone:{},
  geminiKey:'',
  weekPlan:{
    weekday:{ 'בוקר':emptySlot(), 'צהריים':emptySlot(), 'ערב':emptySlot() },
    weekend:{
      'שישי':{ 'בוקר':emptySlot(), 'צהריים':emptySlot(), 'ערב':emptySlot() },
      'שבת':{ 'בוקר':emptySlot(), 'צהריים':emptySlot(), 'ערב':emptySlot() }
    },
    overrides:{},
    wildcards:[]
  }
};

function confirmClick(btn, confirmText, action){
  if(btn.dataset.confirming==='1'){
    delete btn.dataset.confirming;
    action();
  } else {
    const original = btn.textContent;
    btn.dataset.confirming = '1';
    btn.textContent = confirmText;
    btn.style.background = 'var(--bad)';
    btn.style.color = '#fff';
    btn.style.borderColor = 'var(--bad)';
    setTimeout(()=>{
      if(btn.dataset.confirming==='1'){
        delete btn.dataset.confirming;
        btn.textContent = original;
        btn.style.background=''; btn.style.color=''; btn.style.borderColor='';
      }
    }, 3000);
  }
}

function uid(){ return Math.random().toString(36).slice(2,10); }

function ensureStateShape(state){
  if(!state.profiles) state.profiles = JSON.parse(JSON.stringify(DEFAULT_STATE.profiles));
  ['A','B'].forEach(p=>{
    const g = (state.profiles[p]||{}).goals || {};
    if(!state.profiles[p]) state.profiles[p] = {name:p==='A'?'שלי':'בן זוג', goals:{}};
    state.profiles[p].goals = { calories:g.calories??2000, protein:g.protein??120, fiber:g.fiber??25 };
    if(!state.profiles[p].name) state.profiles[p].name = p==='A'?'שלי':'בן זוג';
  });
  if(!state.customTags) state.customTags=[];
  if(!state.pantry) state.pantry=[];
  state.pantry.forEach(p=>{ if(!p.category) p.category='אחר'; });
  if(!state.shopChecked) state.shopChecked={};
  if(!state.shopCategoryOverrides) state.shopCategoryOverrides={};
  if(!state.shopSynonyms) state.shopSynonyms={};
  if(!state.history) state.history=[];
  if(!state.prepDone) state.prepDone={};
  if(state.geminiKey==null) state.geminiKey='';
  if(!state.weekPlan) state.weekPlan = JSON.parse(JSON.stringify(DEFAULT_STATE.weekPlan));
  MEALS.forEach(m=>{ if(!state.weekPlan.weekday[m]) state.weekPlan.weekday[m]=emptySlot(); else fixSlot(state.weekPlan.weekday[m]); });
  DAYS_WEEKEND.forEach(d=>{
    if(!state.weekPlan.weekend[d]) state.weekPlan.weekend[d]={};
    MEALS.forEach(m=>{ if(!state.weekPlan.weekend[d][m]) state.weekPlan.weekend[d][m]=emptySlot(); else fixSlot(state.weekPlan.weekend[d][m]); });
  });
  if(!state.weekPlan.overrides) state.weekPlan.overrides={};
  if(!state.weekPlan.wildcards) state.weekPlan.wildcards=[];
  return state;
}
function fixSlot(slot){
  if(!slot.variantRecipeId) slot.variantRecipeId={A:null,B:null};
  if(!slot.portionMultiplier) slot.portionMultiplier={A:1,B:1};
  if(slot.portionMultiplier.A==null) slot.portionMultiplier.A=1;
  if(slot.portionMultiplier.B==null) slot.portionMultiplier.B=1;
  if(!slot.prep) slot.prep='together';
}

/* ============================================================
   AUTH BOOTSTRAP
   ============================================================ */
function boot(){
  if(NEEDS_SETUP){ startAppLocal(); return; }
  auth.onAuthStateChanged(user=>{
    currentUser = user;
    if(user) startApp();
    else renderLogin();
  });
}

function renderLogin(){
  const root = document.getElementById('app-root');
  root.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className='auth-wrap';
  const card = document.createElement('div'); card.className='auth-card';
  card.innerHTML = `<h2 style="text-align:center;">המטבח שלנו</h2><p class="muted" style="text-align:center;margin-bottom:18px;">כניסה לשני המשתמשים המורשים בלבד</p>`;
  const emailF = document.createElement('input'); emailF.type='email'; emailF.placeholder='אימייל'; emailF.style.marginBottom='10px';
  const passF = document.createElement('input'); passF.type='password'; passF.placeholder='סיסמה'; passF.style.marginBottom='14px';
  const err = document.createElement('div'); err.className='muted'; err.style.color='var(--bad)'; err.style.marginBottom='10px'; err.style.display='none';
  const btn = document.createElement('button'); btn.className='primary'; btn.style.width='100%'; btn.textContent='התחברות';
  btn.onclick = async ()=>{
    err.style.display='none';
    try{ await auth.signInWithEmailAndPassword(emailF.value.trim(), passF.value); }
    catch(e){ err.textContent = 'שגיאת התחברות: '+e.message; err.style.display='block'; }
  };
  card.appendChild(emailF); card.appendChild(passF); card.appendChild(err); card.appendChild(btn);
  wrap.appendChild(card);
  root.appendChild(wrap);
}

function startAppLocal(){
  const root = document.getElementById('app-root');
  root.innerHTML = `
    <div style="background:var(--ochre-l);color:#8A5423;text-align:center;padding:9px 14px;font-size:12.5px;font-weight:600;">
      מצב תצוגה מקומית — עדיין לא משותף. כדי לשתף עם בן/בת הזוג, צריך להגדיר Firebase (הוראות בראש קובץ הקוד).
    </div>

/* ============================================================
   RECIPE HELPERS
   ============================================================ */
function totalServings(r){
  const yRaw = Number(r && r.yieldAmount);
  const uRaw = Number(r && r.unitsPerServing);
  const y = Math.max(0.01, isFinite(yRaw) && yRaw>0 ? yRaw : 1);
  const u = Math.max(0.01, isFinite(uRaw) && uRaw>0 ? uRaw : 1);
  const result = y/u;
  return (isFinite(result) && result>0) ? result : 1;
}
function recipeTotals(r){
  const t = {calories:0,protein:0,fiber:0};
  (r.ingredients||[]).forEach(i=>{
    t.calories += Number(i.calories)||0;
    t.protein  += Number(i.protein)||0;
    t.fiber    += Number(i.fiber)||0;
  });
  return t;
}
function perServing(r){
  const t = recipeTotals(r);
  const s = totalServings(r);
  return {calories:t.calories/s, protein:t.protein/s, fiber:t.fiber/s};
}
function recipeById(id){ return STATE.recipes.find(r=>r.id===id); }
function allTags(){
  const set = new Set(STATE.customTags||[]);
  STATE.recipes.forEach(r=> (r.tags||[]).forEach(t=>set.add(t)));
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'he'));
}

/* ============================================================
   INGREDIENT NAME NORMALIZATION (merge singular/plural, e.g. עגבניה/עגבניות)
   ============================================================ */
function ingredientStem(name){
  let w = (name||'').trim().toLowerCase();
  if(w.endsWith('ים')) return w.slice(0,-2);
  if(w.endsWith('ות')) return w.slice(0,-2);
  if(w.endsWith('ה')) return w.slice(0,-1);
  return w;
}

const CATEGORY_KEYWORDS = {
  'ירקות ופירות': ['עגבני','מלפפון','בצל','שום','גזר','תפוח אדמה','פלפל','חציל','תפוח','בננה','לימון','תות','פירות יער','סלרי','קישוא','חסה','כרוב','אבוקדו'],
  'חלבונים': ['עוף','בשר','דג','טונה','חזה עוף','בשר טחון','קציצ','המבורגר','טופו','סלמון'],
  'מוצרי חלב וביצים': ['ביצ','חלב','גבינה','יוגורט','שמנת','חמאה'],
  'יבשים ודגנים': ['אורז','פסטה','קמח','שיבולת שועל','קינואה','עדשים','שעועית','גרעינים','גרנולה','לחם'],
  'תבלינים ורטבים': ['מלח','כמון','קינמון','שמן זית','רוטב','חומץ','דבש','סוכר','חרדל','קטשופ'],
  'קפואים': ['קפוא','גלידה'],
  'שימורים ומזווה יבש': ['שימור','רסק עגבניות','תירס משומר']
};
// checked in this order so specific/prepared-food keywords (e.g. "רוטב") win over
// broad substrings from raw produce (e.g. "עגבני" also matching inside "רוטב עגבניות")
const CATEGORY_CHECK_ORDER = ['תבלינים ורטבים','שימורים ומזווה יבש','קפואים','מוצרי חלב וביצים','חלבונים','יבשים ודגנים','ירקות ופירות'];
function guessCategoryForItem(name){
  const stem = ingredientStem(name);
  if(STATE.shopCategoryOverrides && STATE.shopCategoryOverrides[stem]) return STATE.shopCategoryOverrides[stem];
  const pantryMatch = STATE.pantry.find(p=> ingredientStem(p.name)===stem);
  if(pantryMatch && pantryMatch.category) return pantryMatch.category;
  const lower = (name||'').toLowerCase();
  for(const cat of CATEGORY_CHECK_ORDER){
    const kws = CATEGORY_KEYWORDS[cat];
    if(kws && kws.some(kw=>lower.includes(kw))) return cat;
  }
  return 'אחר';
}

function pantryCoverage(recipe){
  const allIngs = recipe.ingredients||[];
  if(allIngs.length===0) return 0;
  const essential = allIngs.filter(i=> guessCategoryForItem(i.name) !== 'תבלינים ורטבים');
  const ings = essential.length ? essential : allIngs;
  const pantryStems = new Set(STATE.pantry.map(p=>ingredientStem(p.name)));
  const covered = ings.filter(i=> pantryStems.has(ingredientStem(i.name))).length;
  return covered/ings.length;
}

/* ============================================================
   WEEKLY INGREDIENT AGGREGATION (shared by shopping list + prep-day master-cut list)
   ============================================================ */
function computeWeeklyIngredientAggregate(){
  const agg = {};
  DAYS.forEach(day=>{
    MEALS.forEach(meal=>{
      const slot = computeSlot(day, meal);
      ['A','B'].forEach(profile=>{
        const rid = effectiveRecipeId(slot, profile);
        if(!rid) return;
        const r = recipeById(rid); if(!r) return;
        const mult = effectiveMultiplier(slot, profile);
        (r.ingredients||[]).forEach(ing=>{
          let stem = ingredientStem(ing.name);
          if(STATE.shopSynonyms[stem]) stem = STATE.shopSynonyms[stem];
          const key = stem+'|'+ing.unit;
          if(!agg[key]) agg[key]={name:ing.name, unit:ing.unit, amount:0, recipeNames:new Set()};
          if(ing.name.trim().length > agg[key].name.length) agg[key].name = ing.name.trim();
          agg[key].amount += (Number(ing.amount)||0) * mult;
          agg[key].recipeNames.add(r.name);
        });
      });
    });
  });
  return agg;
}

const PACKAGE_SIZES = {
  'גרם': [100,150,200,250,300,400,500,600,700,750,800,900,1000,1200,1500,2000],
  'מ"ל': [100,200,250,330,500,750,1000,1500,2000],
  'יחידה': [1,2,4,6,10,12,15,18,20,30],
  'כוס': [],
  'כפית': [],
  'כף': []
};
function packageWasteHint(amount, unit){
  const sizes = PACKAGE_SIZES[unit] || [];
  for(const size of sizes){
    if(amount<=size){
      const leftover = size - amount;
      if(leftover/size <= 0.15 && leftover>0) return { packageSize:size, leftover };
      break;
    }
  }
  return null;
}

/* ============================================================
   PREP TIMELINE ENGINE
   Merges identical chopping steps across recipes ("master-cut"),
   kicks off oven-preheat immediately, and lets passive steps
   (baking/simmering) run in the background while active steps
   from other dishes keep happening — a simple but real greedy
   critical-path scheduler.
   ============================================================ */
const STEP_ACTIONS = ['להדליק תנור','לחתוך','לקצוץ','לפרוס','להקפיץ','לטגן','לבשל','לאפות','לערבב','לתבל','להוסיף','להגיש','אחר'];
const CHOP_ACTIONS = ['לחתוך','לקצוץ','לפרוס'];
const PASSIVE_ACTIONS = ['לבשל','לאפות'];
const HEBREW_DAY_NAMES = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
function todayHebrewDayName(){ return HEBREW_DAY_NAMES[new Date().getDay()]; }
function actionEmoji(action){
  const map = {'להדליק תנור':'🔥','לחתוך':'🔪','לקצוץ':'🔪','לפרוס':'🔪','להקפיץ':'🍳','לטגן':'🍳','לבשל':'🍲','לאפות':'🔥','לערבב':'🥣','לתבל':'🧂','להוסיף':'➕','להגיש':'🍽️'};
  return map[action] || '•';
}
function fmtMinutes(mins){
  mins = Math.round(mins);
  const h = Math.floor(mins/60), m = mins%60;
  return h>0 ? `${h}:${String(m).padStart(2,'0')}` : `${m} דק'`;
}

function weeklyNeededRecipes(){
  const neededIds = new Set();
  DAYS.forEach(day=> MEALS.forEach(meal=>{
    const slot = computeSlot(day, meal);
    ['A','B'].forEach(p=>{ const rid = effectiveRecipeId(slot,p); if(rid) neededIds.add(rid); });
  }));
  return Array.from(neededIds).map(id=>recipeById(id)).filter(Boolean);
}

// who actually prepares each recipe this week, taken from the weekly plan itself
// (the "מי מכין" choice on each slot) — this is the single real source of truth,
// not a separate field set inside the recipe.
function weeklyRecipeAssignees(){
  const map = {}; // recipeId -> Set of who values used this week
  DAYS.forEach(day=> MEALS.forEach(meal=>{
    const slot = computeSlot(day, meal);
    const who = slot.prep || 'together';
    ['A','B'].forEach(p=>{
      const rid = effectiveRecipeId(slot,p);
      if(!rid) return;
      if(!map[rid]) map[rid] = new Set();
      map[rid].add(who);
    });
  }));
  const resolved = {};
  Object.keys(map).forEach(rid=>{
    const whos = Array.from(map[rid]);
    resolved[rid] = whos.length===1 ? whos[0] : 'together'; // mixed assignment this week → show under "together"
  });
  return resolved;
}

function computeMasterCutChops(){
  const recipes = weeklyNeededRecipes().filter(r=> (r.steps||[]).length>0);
  const chopAgg = {};
  const usedKeys = new Set();
  recipes.forEach(r=>{
    (r.steps||[]).forEach(s=>{
      if(CHOP_ACTIONS.includes(s.action) && s.canCombine && s.ingredient && s.ingredient.trim()){
        const stem = ingredientStem(s.ingredient);
        if(!chopAgg[stem]) chopAgg[stem] = { ingredient:s.ingredient.trim(), unit:s.unit||'', totalQty:0, totalDuration:0, byRecipe:[] };
        chopAgg[stem].totalQty += Number(s.quantity)||0;
        chopAgg[stem].totalDuration += Number(s.duration)||0;
        chopAgg[stem].byRecipe.push({ name:r.name, qty:Number(s.quantity)||0, unit:s.unit||'' });
        usedKeys.add(r.id+'|'+s.id);
      }
    });
  });
  return { chopAgg, usedKeys };
}

function buildRawTimelineSteps(){
  const recipes = weeklyNeededRecipes().filter(r=> (r.steps||[]).length>0);
  if(recipes.length===0) return [];

  const weekAssignee = weeklyRecipeAssignees();
  const items = [];

  // phase 0: oven preheat — kicked off immediately, costs no foreground time
  recipes.forEach(r=>{
    (r.steps||[]).forEach(s=>{
      if(s.action==='להדליק תנור'){
        items.push({ phase:0, label:`${actionEmoji(s.action)} להדליק תנור${s.ingredient?(' — '+s.ingredient):''}`, duration:Number(s.duration)||0, recipeName:r.name, recipeId:r.id, assignee:weekAssignee[r.id]||'together', passive:true });
      }
    });
  });

  // phase 1: master-cut — merge combinable chopping steps across all recipes (only ones you explicitly marked)
  const { chopAgg, usedKeys } = computeMasterCutChops();
  Object.values(chopAgg).forEach(c=>{
    const breakdown = c.byRecipe.map(b=>`${b.qty}${b.unit} ל${b.name}`).join(', ');
    const dur = c.totalDuration || 5;
    items.push({ phase:1, label:`${actionEmoji('לחתוך')} לחתוך ${c.ingredient} — ${Math.round(c.totalQty*10)/10}${c.unit} בסה"כ (${breakdown})`, duration:dur, assignee:'together', passive:false, chopKey:'chop|'+ingredientStem(c.ingredient) });
  });

  // phase 2: remaining steps, round-robin across recipes so passive steps can run in the background
  //          while active steps from other dishes keep the foreground timeline moving
  const queues = recipes.map(r=>({
    recipeName:r.name,
    recipeId:r.id,
    assignee: weekAssignee[r.id]||'together',
    steps:(r.steps||[]).filter(s=> s.action!=='להדליק תנור' && !usedKeys.has(r.id+'|'+s.id))
  })).filter(q=>q.steps.length);

  let anyLeft = true;
  while(anyLeft){
    anyLeft = false;
    for(const q of queues){
      if(q.steps.length){
        anyLeft = true;
        const s = q.steps.shift();
        const dur = Number(s.duration)||0;
        const passive = PASSIVE_ACTIONS.includes(s.action);
        items.push({ phase:2, label:`${actionEmoji(s.action)} ${s.action}${s.ingredient?(' '+s.ingredient):''}`, duration:dur, recipeName:q.recipeName, recipeId:q.recipeId, assignee:q.assignee, passive });
      }
    }
  }
  return items;
}

// turns an ordered (unscheduled) list of steps into an actual chronological timeline —
// re-run on whatever subset is relevant (e.g. after filtering by assignee) so there
// are never empty "gaps" left over from someone else's filtered-out tasks.
function scheduleTimeline(items){
  const timeline = [];
  let t = 0;
  items.filter(i=>i.phase===0).forEach(i=>{
    timeline.push(Object.assign({}, i, { time:0, endTime:i.duration }));
  });
  items.filter(i=>i.phase!==0).forEach(i=>{
    const dur = i.duration||0;
    timeline.push(Object.assign({}, i, { time:t, endTime:t+dur }));
    if(!i.passive) t += dur;
  });
  const totalMinutes = Math.max(t, ...timeline.map(x=>x.endTime), 0);
  return { timeline, totalMinutes };
}

function buildPrepTimeline(filterAssignee){
  filterAssignee = filterAssignee || 'all';
  const raw = buildRawTimelineSteps();
  if(raw.length===0) return null;
  const filtered = filterAssignee==='all' ? raw : raw.filter(i=> i.assignee===filterAssignee || i.assignee==='together');
  return scheduleTimeline(filtered);
}

/* ============================================================
   IMAGE RESIZE HELPER
   ============================================================ */
function resizeImageFile(file, maxW){
  maxW = maxW || 700;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW/img.width);
        const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ============================================================
   WEEK PLAN RESOLUTION
   ============================================================ */
function computeSlot(day, meal){
  if(DAYS_WEEKEND.includes(day)){
    return Object.assign({source:'weekend'}, STATE.weekPlan.weekend[day][meal]);
  }
  const ov = STATE.weekPlan.overrides[day] && STATE.weekPlan.overrides[day][meal];
  if(ov){
    return { recipeId:ov, variantRecipeId:{A:null,B:null}, portionMultiplier:{A:1,B:1}, prep:STATE.weekPlan.weekday[meal].prep, source:'override' };
  }
  const wc = STATE.weekPlan.wildcards.find(w=> w.meal===meal && (w.assignedDays||[]).includes(day));
  if(wc){
    return { recipeId:wc.altRecipeId, variantRecipeId:{A:null,B:null}, portionMultiplier:{A:1,B:1}, prep:STATE.weekPlan.weekday[meal].prep, source:'wildcard' };
  }
  return Object.assign({source:'base'}, STATE.weekPlan.weekday[meal]);
}
function effectiveRecipeId(slot, profile){
  return (slot.variantRecipeId && slot.variantRecipeId[profile]) ? slot.variantRecipeId[profile] : slot.recipeId;
}
function effectiveMultiplier(slot, profile){
  return (slot.portionMultiplier && slot.portionMultiplier[profile]) || 1;
}

function renderRecipeGridOnly(){
  const host = document.getElementById('recipe-grid-host');
  if(!host) return;
  host.innerHTML = '';
  host.appendChild(buildRecipeGrid());
}

function buildRecipeGrid(){
  let list = STATE.recipes.slice();
  if(recipeSearch.trim()){
    const q = recipeSearch.trim().toLowerCase();
    list = list.filter(r=> r.name.toLowerCase().includes(q));
  }
  if(recipeTagFilter.length){
    list = list.filter(r=> (r.tags||[]).some(t=>recipeTagFilter.includes(t)));
  }
  if(recipeSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'he'));
  else if(recipeSort==='lastOpened') list.sort((a,b)=>(b.lastOpenedAt||0)-(a.lastOpenedAt||0));
  else if(recipeSort==='createdAt') list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  else if(recipeSort==='rating') list.sort((a,b)=>(b.rating||0)-(a.rating||0));
  else if(recipeSort==='favorite') list.sort((a,b)=>(b.favorite?1:0)-(a.favorite?1:0));

  if(list.length===0){
    const empty = document.createElement('div'); empty.className='card empty';
    empty.textContent = STATE.recipes.length===0 ? 'עוד אין מתכונים בספרייה. הוסיפי את הראשון 🍲' : 'אין מתכונים שתואמים לחיפוש/סינון.';
    return empty;
  }

  const grid = document.createElement('div'); grid.className='recipe-grid';
  list.forEach(r=>{
    const card = document.createElement('div'); card.className='recipe-card';
    card.onclick = ()=> openRecipeDetail(r.id);
    if(r.image){
      const img = document.createElement('img'); img.className='thumb'; img.src=r.image; card.appendChild(img);
    } else {
      const ph = document.createElement('div'); ph.className='thumb placeholder'; ph.textContent='🍽️'; card.appendChild(ph);
    }
    const info = document.createElement('div'); info.className='info';
    const nameEl = document.createElement('div'); nameEl.className='name'; nameEl.textContent = r.name;
    info.appendChild(nameEl);
    const metaEl = document.createElement('div'); metaEl.className='meta';
    metaEl.textContent = `${Math.round(perServing(r).calories)} קק"ל למנה${r.rating?' · '+'★'.repeat(r.rating):''}${r.favorite?' · ❤️':''}`;
    info.appendChild(metaEl);
    card.appendChild(info);
    grid.appendChild(card);
  });
  return grid;
}

function field(labelText, opts){
  opts = opts || {};
  const wrap = document.createElement('div'); wrap.className='field';
  const label = document.createElement('label'); label.textContent=labelText; wrap.appendChild(label);
  const el = opts.textarea ? document.createElement('textarea') : document.createElement('input');
  if(!opts.textarea) el.type = opts.type || 'text';
  if(opts.rows) el.rows = opts.rows;
  el.value = opts.value ?? '';
  if(opts.placeholder) el.placeholder = opts.placeholder;
  el.oninput = (e)=>{ if(opts.onInput) opts.onInput(e.target.value); };
  wrap.appendChild(el);
  return {wrap, el};
}

async function autoFillIngredientIfNeeded(ing, box){
  if(ing._per100 || !ing.name || !ing.name.trim() || ing.calories) return;
  try{
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(ing.name.trim())}&search_simple=1&action=process&json=1&page_size=1`;
    const res = await fetch(url);
    const data = await res.json();
    const p = (data.products||[])[0];
    if(p && p.nutriments && p.nutriments['energy-kcal_100g']!=null){
      ing._per100 = { calories:p.nutriments['energy-kcal_100g']||0, protein:p.nutriments['proteins_100g']||0, fiber:p.nutriments['fiber_100g']||0 };
    } else {
      const staple = lookupStapleNutrition(ing.name);
      if(staple) ing._per100 = Object.assign({}, staple);
    }
    if(ing._per100){
      const factor = (Number(ing.amount)||100)/100;
      ing.calories = Math.round(ing._per100.calories*factor);
      ing.protein = Math.round(ing._per100.protein*factor);
      ing.fiber = Math.round(ing._per100.fiber*factor);
      render();
    }
  }catch(e){
    const staple = lookupStapleNutrition(ing.name);
    if(staple){
      ing._per100 = Object.assign({}, staple);
      const factor = (Number(ing.amount)||100)/100;
      ing.calories = Math.round(staple.calories*factor);
      ing.protein = Math.round(staple.protein*factor);
      ing.fiber = Math.round(staple.fiber*factor);
      render();
    }
  }
}

async function searchOpenFoodFacts(ingId, query, cardEl){
  query = (query||'').trim();
  if(!query){ alert('קודם צריך לכתוב שם מרכיב'); return; }
  const resultsHost = cardEl.querySelector('#off-results-'+ingId);
  resultsHost.innerHTML = '<div class="off-results">מחפשת ב-Open Food Facts...</div>';
  try{
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(query)}&search_simple=1&action=process&json=1&page_size=5`;
    const res = await fetch(url);
    const data = await res.json();
    const products = (data.products||[]).filter(p=>p.nutriments && (p.nutriments['energy-kcal_100g']!=null));
    const staple = lookupStapleNutrition(query);
    if(products.length===0 && !staple){ resultsHost.innerHTML = '<div class="off-results">לא נמצאו תוצאות. אפשר להזין ידנית.</div>'; return; }
    const list = document.createElement('div'); list.className='off-results';
    if(staple){
      const item = document.createElement('div'); item.className='off-result-item';
      const label = document.createElement('span'); label.textContent = `${query} (ערך בסיסי מוערך) · ${staple.calories} קק"ל/100g`;
      const btn = document.createElement('button'); btn.textContent='בחירה';
      btn.onclick = ()=>{
        const target = draftIngredients.find(x=>x.id===ingId); if(!target) return;
        target._per100 = Object.assign({}, staple);
        const amount = Number(target.amount)||100; const factor = amount/100;
        target.calories = Math.round(staple.calories*factor);
        target.protein = Math.round(staple.protein*factor);
        target.fiber = Math.round(staple.fiber*factor);
        render();
      };
      item.appendChild(label); item.appendChild(btn); list.appendChild(item);
    }
    products.forEach(p=>{
      const n = p.nutriments;
      const item = document.createElement('div'); item.className='off-result-item';
      const label = document.createElement('span'); label.textContent = `${p.product_name||query} · ${Math.round(n['energy-kcal_100g']||0)} קק"ל/100g`;
      const btn = document.createElement('button'); btn.textContent='בחירה';
      btn.onclick = ()=>{
        const target = draftIngredients.find(x=>x.id===ingId); if(!target) return;
        target._per100 = { calories:n['energy-kcal_100g']||0, protein:n['proteins_100g']||0, fiber:n['fiber_100g']||0 };
        const amount = Number(target.amount)||100; const factor = amount/100;
        target.calories = Math.round((n['energy-kcal_100g']||0)*factor);
        target.protein = Math.round((n['proteins_100g']||0)*factor);
        target.fiber = Math.round((n['fiber_100g']||0)*factor);
        if(!target.name) target.name = p.product_name||query;
        render();
      };
      item.appendChild(label); item.appendChild(btn); list.appendChild(item);
    });
    resultsHost.innerHTML=''; resultsHost.appendChild(list);
  }catch(e){ resultsHost.innerHTML = '<div class="off-results">שגיאה בחיפוש.</div>'; }
}

async function importFromUrl(url){
  url = (url||'').trim();
  const statusEl = document.getElementById('paste-status');
  if(!url){ statusEl.textContent='צריך להדביק קישור קודם.'; return; }
  statusEl.textContent = 'מנסה לגשת לקישור...';
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('שגיאת שרת '+res.status);
    const html = await res.text();
    const div = document.createElement('div'); div.innerHTML = html;
    div.querySelectorAll('script,style,nav,header,footer').forEach(el=>el.remove());
    const text = (div.innerText||div.textContent||'').replace(/\n{3,}/g,'\n\n').trim();
    if(!text) throw new Error('לא נמצא טקסט');
    document.getElementById('paste-input').value = text.slice(0,6000);
    statusEl.textContent = 'הטקסט הוכנס. לוחצים "פענוח אוטומטי".';
  }catch(e){
    statusEl.textContent = 'לא הצלחתי לגשת לקישור (חסימה נפוצה באתרים רבים). אפשר להעתיק ידנית.';
  }
}

async function smartParseRecipe(){
  const raw = document.getElementById('paste-input').value.trim();
  const statusEl = document.getElementById('paste-status');
  if(!raw){ statusEl.textContent='אין טקסט להדביק.'; return; }
  if(!STATE.geminiKey){ statusEl.textContent='צריך קודם להגדיר מפתח Gemini בטאב Gemini.'; return; }
  statusEl.textContent = 'מפענחת עם Gemini...';
  const prompt = `אתה מקבל מתכון בעברית או באנגלית, מודבק כטקסט חופשי. החזר אך ורק JSON תקני (ללא מרקדאון) בפורמט:
{"name":"...","yieldAmount":מספר,"yieldUnit":"...","unitsPerServing":מספר,"ingredients":[{"name":"...","amount":מספר,"unit":"..."}],"instructions":"...","tags":["..."]}
טקסט המתכון:
"""${raw}"""`;
  try{

  }catch(e){ statusEl.textContent = 'משהו השתבש: '+e.message; }

async function fetchNutritionFor(name, amount){
  const factor = (Number(amount)||100)/100;
  try{
    const url = `https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(name)}&search_simple=1&action=process&json=1&page_size=1`;
    const res = await fetch(url);
    const data = await res.json();
    const p = (data.products||[])[0];
    if(p && p.nutriments && p.nutriments['energy-kcal_100g']!=null){
      return {
        calories: Math.round((p.nutriments['energy-kcal_100g']||0)*factor),
        protein: Math.round((p.nutriments['proteins_100g']||0)*factor),
        fiber: Math.round((p.nutriments['fiber_100g']||0)*factor)
      };
    }
  }catch(e){}
  const staple = lookupStapleNutrition(name);
  if(staple){
    return { calories: Math.round(staple.calories*factor), protein: Math.round(staple.protein*factor), fiber: Math.round(staple.fiber*factor) };
  }
  return null;
}

async function autoFillNutritionForDraft(){
  for(const ing of draftIngredients){
    if(!ing.name || ing.calories) continue;
    const result = await fetchNutritionFor(ing.name, ing.amount);
    if(result){ ing.calories=result.calories; ing.protein=result.protein; ing.fiber=result.fiber; }
  }
  render();
}

   BULK FIX TOOLS FOR IMPORTED RECIPES
   ============================================================ */
async function bulkFillNutritionForImported(btnEl){
  const statusEl = document.getElementById('bulk-tools-status');
  const setStatus = (t)=>{ if(statusEl) statusEl.textContent=t; };
  const targets = STATE.recipes.filter(r=> r.importedFrom==='mcb' && (r.ingredients||[]).some(i=>!i.calories));
  if(targets.length===0){ setStatus('אין מתכונים שצריכים השלמת ערכים.'); return; }
  if(btnEl) btnEl.disabled = true;
  let doneRecipes = 0;
  for(const r of targets){
    setStatus(`ממלאת ערכים תזונתיים: ${doneRecipes+1}/${targets.length} — ${r.name}...`);
    const ingredients = (r.ingredients||[]).map(i=>Object.assign({}, i));
    for(const ing of ingredients){
      if(ing.calories || !ing.name) continue;
      const result = await fetchNutritionFor(ing.name, ing.amount);
      if(result){ ing.calories=result.calories; ing.protein=result.protein; ing.fiber=result.fiber; }
    }
    try{ await updateRecipeDoc(r.id, {ingredients}); }catch(e){ setStatus('שגיאה בשמירת '+r.name+': '+e.message); }
    doneRecipes++;
  }
  if(btnEl) btnEl.disabled = false;
  render();
  const fresh = document.getElementById('bulk-tools-status');
  if(fresh) fresh.textContent = `הושלם — עברתי על ${doneRecipes} מתכונים. כדאי לבדוק ולתקן ידנית מרכיבים שלא נמצאו.`;
}

async function bulkParseFreeTextIngredients(btnEl){
  const statusEl = document.getElementById('bulk-tools-status');
  const setStatus = (t)=>{ if(statusEl) statusEl.textContent=t; };
  if(!STATE.geminiKey){ setStatus('צריך קודם להגדיר מפתח Gemini (בטאב עוזר AI).'); return; }
  const targets = STATE.recipes.filter(r=> r.ingredientsAreFreeText);
  if(targets.length===0){ setStatus('אין מתכונים שצריכים פירוק.'); return; }
  if(btnEl) btnEl.disabled = true;
  let done = 0;
  for(const r of targets){
    setStatus(`מפרקת מרכיבים: ${done+1}/${targets.length} — ${r.name}...`);
    const lines = (r.ingredients||[]).map(i=>i.name).filter(Boolean);
    if(lines.length===0){ done++; continue; }
    const prompt = `הפוך כל שורת מרכיב לאובייקט JSON עם name (שם המרכיב בלבד, בלי כמות), amount (מספר), unit (אחת מ: גרם, מ"ל, יחידה, כפית, כף, כוס — הכי מתאים). החזר מערך JSON בדיוק באותו סדר וכמות שורות, בלי טקסט נוסף.
שורות:
${lines.map((l,i)=>`${i+1}. ${l}`).join('\n')}`;
    try{
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(STATE.geminiKey)}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{responseMimeType:'application/json'} })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error.message);
      const text = data.candidates[0].content.parts.map(p=>p.text).join('');
      const parsedLines = JSON.parse(text);
      const oldIngredients = r.ingredients||[];
      const newIngredients = oldIngredients.map((old, i)=>{
        const p = parsedLines[i];
        if(!p) return old;
        return { name:p.name||old.name, amount:p.amount!=null?String(p.amount):old.amount, unit:p.unit||old.unit, calories:old.calories||0, protein:old.protein||0, fiber:old.fiber||0 };
      });
      await updateRecipeDoc(r.id, {ingredients:newIngredients, ingredientsAreFreeText:false});
    }catch(e){
      setStatus(`שגיאה במתכון "${r.name}": ${e.message} — ממשיכה לבא בתור.`);
    }
    done++;
  }
  if(btnEl) btnEl.disabled = false;
  render();
  const fresh = document.getElementById('bulk-tools-status');
  if(fresh) fresh.textContent = `הושלם — עברתי על ${done} מתכונים. כדאי לעבור על התוצאה, במיוחד שברים ("1 1/2").`;
}

async function saveRecipeFromForm(){
  if(!draftRecipe.name.trim()){ alert('צריך שם למתכון'); return; }
  const ingredients = draftIngredients.filter(i=>i.name&&i.name.trim()).map(i=>({
    name:i.name.trim(), amount:i.amount, unit:i.unit,
    calories:Number(i.calories)||0, protein:Number(i.protein)||0, fiber:Number(i.fiber)||0
  }));
  const steps = draftSteps.map(s=>({
    id:s.id, action:s.action, ingredient:(s.ingredient||'').trim(), quantity:s.quantity, unit:s.unit,
    duration:s.duration, assignee:s.assignee||'together', canCombine:!!s.canCombine
  }));
  const payload = {
    name: draftRecipe.name.trim(), category:(draftRecipe.category||'').trim(), mealType: draftRecipe.mealType, mealGroup:(draftRecipe.mealGroup||'').trim(),
    yieldAmount: Number(draftRecipe.yieldAmount)||1, yieldUnit: draftRecipe.yieldUnit||'מנות',
    unitsPerServing: Number(draftRecipe.unitsPerServing)||1,
    tags: draftRecipe.tags, prepTimeMinutes: Number(draftRecipe.prepTimeMinutes)||0, description:(draftRecipe.description||'').trim(),
    rating: Number(draftRecipe.rating)||0, link:(draftRecipe.link||'').trim(),
    notes: draftRecipe.notes, instructions: draftRecipe.instructions,
    image: draftRecipe.image||'', ingredients, steps, favorite: false
  };
  try{
    if(editingRecipeId){
      const existing = recipeById(editingRecipeId);
      payload.favorite = existing ? !!existing.favorite : false;
      if(STORAGE_MODE==='local'){
        const idx = STATE.recipes.findIndex(r=>r.id===editingRecipeId);
        if(idx>=0) STATE.recipes[idx] = Object.assign({}, STATE.recipes[idx], payload);
        saveState();
      } else {
        await db.collection('recipes').doc(editingRecipeId).update(payload);
      }
    } else {
      await createRecipe(payload);
    }
    showAddForm = false; editingRecipeId=null; draftIngredients=[]; draftSteps=[]; draftRecipe=null;
    render();
  }catch(e){ alert('שגיאה בשמירה: '+e.message); }
}

/* ============================================================
   MCB / XML IMPORT (My CookBook / Cookmate format)
   .mcb files are a ZIP containing one XML file (schema documented at
   cookmate.blog/my-cookbook-xml-schema) plus an "images" folder.
   Tags: title, preptime, cooktime, description(<li>), ingredient(<li>),
   recipetext(<li>), url, quantity, imagepath, comments, rating, category(*n)
   ============================================================ */
let mcbPending = null; // array of parsed-but-not-yet-saved recipes
let mcbImportStatusText = '';

function mcbText(recipeEl, tagName){
  const el = recipeEl.querySelector(tagName);
  if(!el) return '';
  return el.textContent.trim();
}
function mcbListText(recipeEl, tagName){
  const el = recipeEl.querySelector(tagName);
  if(!el) return '';
  const lis = el.querySelectorAll('li');
  if(lis.length) return Array.from(lis).map(li=>li.textContent.trim()).filter(Boolean).join('\n');
  return el.textContent.trim();
}
function mcbParseMinutes(text){
  if(!text) return '';
  const m = text.match(/(\d+)/);
  return m ? m[1] : '';
}

async function mcbResizeImageBlob(blob){
  return new Promise((resolve)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      try{
        const img = new Image();
        img.onload = ()=>{
          const scale = Math.min(1, 700/img.width);
          const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
          const canvas = document.createElement('canvas'); canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg',0.72));
        };
        img.onerror = ()=>resolve('');
        img.src = reader.result;
      }catch(e){ resolve(''); }
    };
    reader.onerror = ()=>resolve('');
    reader.readAsDataURL(blob);
  });
}

async function parseMyCookBookXml(xmlText, imageFiles, onProgress){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('קובץ ה-XML לא תקין');
  const recipeEls = Array.from(doc.querySelectorAll('recipe'));
  const results = [];
  let i = 0;
  for(const rEl of recipeEls){
    i++;
    const name = mcbText(rEl,'title') || 'מתכון ללא שם';
    if(onProgress && (i%10===0 || i===recipeEls.length)) onProgress(i, recipeEls.length, name);
    const categories = Array.from(rEl.querySelectorAll('category')).map(c=>c.textContent.trim()).filter(Boolean);
    const description = mcbListText(rEl,'description');
    const ingredientLines = mcbListText(rEl,'ingredient').split('\n').map(s=>s.trim()).filter(Boolean);
    const instructions = mcbListText(rEl,'recipetext');
    const link = mcbText(rEl,'url');
    const quantity = mcbText(rEl,'quantity');
    // real files use <imagepath>path</imagepath> and/or one-or-more <image><path>path</path></image>
    let imagepath = mcbText(rEl,'imagepath');
    if(!imagepath){
      const imgPathEl = rEl.querySelector('image path');
      if(imgPathEl) imagepath = imgPathEl.textContent.trim();
    }
    const comments = mcbText(rEl,'comments');
    const source = mcbText(rEl,'source');
    const ratingText = mcbText(rEl,'rating');
    const prepTime = mcbParseMinutes(mcbText(rEl,'preptime'));

    let image = '';
    if(imagepath && imageFiles){
      const base = imagepath.split(/[\\/]/).pop();
      const match = Object.keys(imageFiles).find(f=> f.split(/[\\/]/).pop() === base);
      if(match){
        try{
          const blob = await imageFiles[match].async('blob');
          image = await mcbResizeImageBlob(blob);
        }catch(e){ image=''; }
      }
    }

    results.push({
      name, category: categories[0]||'', tags: categories.slice(1),
      description, prepTimeMinutes: prepTime, link,
      yieldAmount: quantity||1, yieldUnit:'מנות', unitsPerServing:1,
      rating: Number(ratingText)||0,
      notes: [comments, source?('מקור: '+source):''].filter(Boolean).join('\n'),
      instructions,
      ingredients: ingredientLines.map(line=>({ name:line, amount:'', unit:'', calories:0, protein:0, fiber:0 })),
      steps: [], mealType:'כל סוג', mealGroup:'', image,
      importedFrom:'mcb', ingredientsAreFreeText:true,
      _selected: true
    });
  }
  return results;
}

async function importMcbFile(file){
  const statusEl = document.getElementById('import-status');
  const setStatus = (t)=>{ if(statusEl) statusEl.textContent = t; console.log('[mcb import]', t); };
  setStatus('קוראת את הקובץ...');

  if(typeof JSZip === 'undefined'){
    setStatus('שגיאה: ספריית פתיחת הקבצים (JSZip) לא נטענה — בדקי חיבור אינטרנט ורעננו את הדף.');
    return;
  }

  const lowerName = file.name.toLowerCase();
  let xmlText = '';
  let imageFiles = {};

  if(lowerName.endsWith('.xml')){
    try{ xmlText = await file.text(); }
    catch(e){ setStatus('שגיאה בקריאת קובץ ה-XML: '+e.message); console.error(e); return; }
  } else {
    // .mcb / .zip — try as a zip archive first
    try{
      const zip = await JSZip.loadAsync(file);
      const xmlEntry = Object.values(zip.files).find(f=> !f.dir && f.name.toLowerCase().endsWith('.xml'));
      if(!xmlEntry){
        setStatus('הקובץ נפתח כארכיון אבל לא נמצא בתוכו קובץ XML.');
        return;
      }
      xmlText = await xmlEntry.async('string');
      Object.keys(zip.files).forEach(name=>{
        const f = zip.files[name];
        if(!f.dir && /\.(png|jpg|jpeg|gif|webp)$/i.test(name)) imageFiles[name] = f;
      });
      setStatus(`נפתח כארכיון · נמצאו ${Object.keys(imageFiles).length} תמונות · מפענחת מתכונים...`);
    }catch(zipErr){
      console.warn('[mcb import] not a valid zip, trying as raw XML instead:', zipErr);
      // fallback: some exports name a plain XML file with a .mcb extension
      try{
        xmlText = await file.text();
        setStatus('הקובץ לא היה ארכיון תקין — ניסיתי לקרוא אותו כ-XML גולמי (בלי תמונות)...');
      }catch(textErr){
        setStatus('שגיאה: הקובץ אינו ארכיון ZIP תקין ואינו XML תקין. שגיאה מקורית: '+zipErr.message);
        console.error(zipErr, textErr);
        return;
      }
    }
  }

  try{
    const parsed = await parseMyCookBookXml(xmlText, imageFiles, (i,total,name)=> setStatus(`מפענחת מתכונים... ${i}/${total} (${name})`));
    if(parsed.length===0){ setStatus('הקובץ נקרא בהצלחה אבל לא נמצאו בו תגי <recipe> — ייתכן שזה לא פורמט MyCookBook/Cookmate.'); return; }
    const withImages = parsed.filter(r=>r.image).length;
    mcbPending = parsed;
    setStatus(`נמצאו ${parsed.length} מתכונים (${withImages} עם תמונה) — בדקי למטה ואשרי ייבוא.`);
    render();
  }catch(e){
    setStatus('שגיאה בפענוח המתכונים מתוך ה-XML: '+e.message);
    console.error(e);
  }
}

function renderMcbReview(){
  const card = document.createElement('div'); card.className='card';
  card.style.border = '2px solid var(--forest)';
  const h = document.createElement('h3'); h.textContent = `ייבוא מ-MCB — ${mcbPending.length} מתכונים נמצאו`; card.appendChild(h);
  const note = document.createElement('div'); note.className='muted'; note.style.marginBottom='10px';
  note.textContent = 'בדקי את הרשימה, בטלי סימון למתכונים שלא רוצים לייבא. אחרי הייבוא אפשר להשתמש בכפתורים "השלמת ערכים תזונתיים" ו"פירוק מרכיבים לכמות ויחידה" בראש טאב המתכונים.';
  card.appendChild(note);

  const makeControlsRow = ()=>{
    const row = document.createElement('div'); row.style.display='flex'; row.style.gap='8px'; row.style.marginBottom='10px';
    const selectAllBtn = document.createElement('button'); selectAllBtn.className='secondary'; selectAllBtn.style.flex='1';
    const allSelected = mcbPending.every(r=>r._selected);
    selectAllBtn.textContent = allSelected ? 'ביטול בחירת הכל' : 'בחירת הכל';
    selectAllBtn.onclick = ()=>{ const newVal=!allSelected; mcbPending.forEach(r=>r._selected=newVal); render(); };
    const importBtn = document.createElement('button'); importBtn.className='primary'; importBtn.style.flex='1'; importBtn.textContent='ייבוא הנבחרים';
    importBtn.onclick = confirmMcbImport;
    row.appendChild(selectAllBtn); row.appendChild(importBtn);
    return row;
  };

  card.appendChild(makeControlsRow());

  mcbPending.forEach((rec, idx)=>{
    const row = document.createElement('div'); row.style.display='flex'; row.style.alignItems='center'; row.style.gap='10px'; row.style.padding='8px 0'; row.style.borderBottom='1px solid var(--line)';
    const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=rec._selected; cb.style.width='20px'; cb.style.height='20px'; cb.style.minHeight='unset';
    cb.onchange = ()=>{ rec._selected = cb.checked; };
    row.appendChild(cb);
    const info = document.createElement('div'); info.style.flex='1';
    info.innerHTML = `<b>${rec.name}</b><div class="muted" style="font-size:12px;">${rec.category||'ללא קטגוריה'} · ${rec.ingredients.length} מרכיבים${rec.image?' · תמונה ✓':''}</div>`;
    row.appendChild(info);
    card.appendChild(row);
  });

  card.appendChild(makeControlsRow());
  const cancelBtn = document.createElement('button'); cancelBtn.className='ghost'; cancelBtn.style.width='100%'; cancelBtn.textContent='ביטול הייבוא';
  cancelBtn.onclick = ()=>{ mcbPending=null; render(); };
  card.appendChild(cancelBtn);
  const statusEl = document.createElement('div'); statusEl.id='mcb-confirm-status'; statusEl.className='muted'; statusEl.style.marginTop='6px';
  card.appendChild(statusEl);
  return card;
}

async function confirmMcbImport(){
  const statusEl = document.getElementById('mcb-confirm-status');
  const selected = mcbPending.filter(r=>r._selected);
  let done = 0;
  for(const rec of selected){
    const payload = Object.assign({}, rec);
    delete payload._selected;
    try{ await createRecipe(payload); done++; if(statusEl) statusEl.textContent = `יובאו ${done}/${selected.length}...`; }
    catch(e){ if(statusEl) statusEl.textContent = `שגיאה אחרי ${done} מתכונים: ${e.message}`; return; }
  }
  mcbPending = null;
  render();
  const freshImportStatus = document.getElementById('import-status');
  if(freshImportStatus) freshImportStatus.textContent = `יובאו ${done} מתכונים בהצלחה ✓`;
}

async function deleteRecipe(id){
  try{
    if(STORAGE_MODE==='local'){
      STATE.recipes = STATE.recipes.filter(r=>r.id!==id);
      saveState();
    } else {
      await db.collection('recipes').doc(id).delete();
    }
    showAddForm=false; editingRecipeId=null;
    if(recipeDetailId===id) closeRecipeDetail(); else render();
  }catch(e){ alert('שגיאה במחיקה: '+e.message); }
}

  };

let wakeLockObj = null;
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLockObj = await navigator.wakeLock.request('screen');
      wakeLockObj.addEventListener('release', ()=>{ wakeLockObj = null; });
    } else {
      console.warn('Wake Lock API not supported on this browser');
    }
  }catch(e){
    console.warn('Wake lock request failed:', e);
    wakeLockObj = null;
  }
}
function releaseWakeLock(){
  if(wakeLockObj){
    wakeLockObj.release().catch(()=>{});
    wakeLockObj = null;
  }
}
document.addEventListener('visibilitychange', async ()=>{
  if(document.visibilityState==='visible' && homePrepMode && !wakeLockObj){
    await requestWakeLock();
  }
});

function suggestRecipesForSlot(mealType){
  const candidates = STATE.recipes.filter(r=> !mealType || r.mealType===mealType || r.mealType==='כל סוג');
  if(candidates.length===0) return [];
  const lastWeek = STATE.history.length ? STATE.history[STATE.history.length-1] : null;
  const lastWeekRecipeIds = new Set();
  if(lastWeek && lastWeek.weekPlan){
    MEALS.forEach(m=>{ const s=lastWeek.weekPlan.weekday && lastWeek.weekPlan.weekday[m]; if(s && s.recipeId) lastWeekRecipeIds.add(s.recipeId); });
    DAYS_WEEKEND.forEach(d=>{ MEALS.forEach(m=>{ const s=lastWeek.weekPlan.weekend && lastWeek.weekPlan.weekend[d] && lastWeek.weekPlan.weekend[d][m]; if(s && s.recipeId) lastWeekRecipeIds.add(s.recipeId); }); });
  }
  const avgGoalCalPerMeal = ((STATE.profiles.A.goals.calories||0)+(STATE.profiles.B.goals.calories||0))/2/MEALS.length;
  const scored = candidates.map(r=>{
    const pantryScore = pantryCoverage(r);
    const varietyScore = lastWeekRecipeIds.has(r.id) ? 0 : 1;
    const cal = perServing(r).calories;
    const nutriScore = 1/(1+Math.abs(cal-avgGoalCalPerMeal)/200);
    const total = pantryScore*0.4 + varietyScore*0.3 + nutriScore*0.3;
    return {r, total, pantryScore, varietyScore};
  }).sort((a,b)=>b.total-a.total);
  return scored.slice(0,3);
}

  const mBInput = document.createElement('input'); mBInput.type='number'; mBInput.step='0.25'; mBInput.value=slot.portionMultiplier.B;
  mBInput.onchange = ()=>{ slot.portionMultiplier.B = Number(mBInput.value)||1; onChange(); };
  mB.appendChild(mBInput);

  const prepSel = document.createElement('select'); prepSel.style.marginTop='6px';
  [['together','ביחד'],['A','מכין: '+STATE.profiles.A.name],['B','מכין: '+STATE.profiles.B.name]].forEach(([v,l])=>{
    const o=document.createElement('option'); o.value=v; o.textContent=l; if((slot.prep||'together')===v) o.selected=true; prepSel.appendChild(o);
  });

function computeWeekAvg(profile){
  let totals={calories:0,protein:0,fiber:0}; let filledDays=0;
  DAYS.forEach(day=>{
    let dayTotal={calories:0,protein:0,fiber:0}; let any=false;
    MEALS.forEach(m=>{
      const slot = computeSlot(day,m);
      const rid = effectiveRecipeId(slot, profile);
      if(rid){
        const r = recipeById(rid);
        if(r){
          const mult = effectiveMultiplier(slot, profile);
          const ps = perServing(r);
          dayTotal.calories += ps.calories*mult; dayTotal.protein += ps.protein*mult; dayTotal.fiber += ps.fiber*mult;
          any = true;
        }
      }
    });
    if(any){ filledDays++; totals.calories+=dayTotal.calories; totals.protein+=dayTotal.protein; totals.fiber+=dayTotal.fiber; }
  });
  const avg = filledDays ? {calories:totals.calories/filledDays, protein:totals.protein/filledDays, fiber:totals.fiber/filledDays} : {calories:0,protein:0,fiber:0};
  return {avg, filledDays};
}

  const card = document.createElement('div'); card.className='card';

  const goals = STATE.profiles[profile].goals;
  const {avg, filledDays} = computeWeekAvg(profile);
  [['קלוריות','calories','קק"ל'],['חלבון','protein','g'],['סיבים','fiber','g']].forEach(([label,key,unit])=>{
    const pw = document.createElement('div'); pw.className='progress-wrap';
    const pct = goals[key] ? Math.min(100, Math.round(avg[key]/goals[key]*100)) : 0;
    const over = avg[key] > goals[key]*1.05;
    pw.innerHTML = `<div style="display:flex;justify-content:space-between;font-size:13px;"><span>${label}</span><span class="muted">${Math.round(avg[key])} / ${goals[key]} ${unit}</span></div>
    <div class="progress-bar"><div class="progress-fill${over?' over':''}" style="width:${pct}%"></div></div>`;
    card.appendChild(pw);
  });
  if(!filledDays){ const n=document.createElement('div'); n.className='muted'; n.textContent='עוד לא הוגדרו ארוחות.'; card.appendChild(n); }
  return card;
}

let semanticMergeSuggestions = null;

async function suggestSemanticMerges(btnEl){
  const statusEl = document.getElementById('smart-merge-status');
  const setStatus = (t)=>{ if(statusEl) statusEl.textContent=t; };
  if(!STATE.geminiKey){ setStatus('צריך קודם להגדיר מפתח Gemini (בטאב עוזר AI).'); return; }
  const agg = computeWeeklyIngredientAggregate();
  const items = Object.values(agg).map(it=>it.name);
  if(items.length<2){ setStatus('אין מספיק פריטים ברשימה כדי לחפש איחודים.'); return; }
  if(btnEl) btnEl.disabled = true;
  setStatus('בודקת עם Gemini אם יש פריטים שכדאי לאחד...');
  const prompt = `הנה רשימת שמות מצרכים מרשימת קניות (בעברית). מצא קבוצות של שמות שמתייחסים בבירור לאותו מצרך ממש (למשל הטיות שונות, יחיד/רבים שלא זוהו אוטומטית, איות שונה) — לא מצרכים שסתם דומים. החזר אך ורק JSON: מערך של אובייקטים {"canonical":"שם מומלץ", "items":["שם1","שם2"]}, רק לקבוצות עם 2+ פריטים באמת זהים. אם אין כאלה, החזר מערך ריק.
רשימה:
${items.map((n,i)=>`${i+1}. ${n}`).join('\n')}`;
  try{
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(STATE.geminiKey)}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{responseMimeType:'application/json'} })
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error.message);
    const text = data.candidates[0].content.parts.map(p=>p.text).join('');
    const parsed = JSON.parse(text);
    const groups = (parsed||[]).filter(g=> g.items && g.items.length>=2);
    if(groups.length===0){ setStatus('Gemini לא מצאה פריטים כפולים שכדאי לאחד השבוע.'); if(btnEl) btnEl.disabled=false; return; }
    semanticMergeSuggestions = groups.map(g=>({ canonical:g.canonical||g.items[0], items:g.items, approved:false }));
    setStatus(`נמצאו ${groups.length} הצעות איחוד — בדקי למטה ואשרי כל אחת עם V.`);
    render();
  }catch(e){
    setStatus('שגיאה: '+e.message);
  }
  if(btnEl) btnEl.disabled = false;
}

function renderProgressChart(){
  const card = document.createElement('div'); card.className='card';
  const h = document.createElement('h3'); h.textContent='קלוריות יומיות ממוצעות'; card.appendChild(h);
  const entries = STATE.history;
  const seriesA = entries.map(e=> e.profiles.A && e.profiles.A.filledDays ? e.profiles.A.avg.calories : null);
  const seriesB = entries.map(e=> e.profiles.B && e.profiles.B.filledDays ? e.profiles.B.avg.calories : null);
  const goalA = STATE.profiles.A.goals.calories, goalB = STATE.profiles.B.goals.calories;
  const allVals = [...seriesA, ...seriesB, goalA, goalB].filter(v=>v!=null && !isNaN(v));
  const maxV = Math.max(...allVals, 1) * 1.15;
  const W=300,H=140,padL=10,padR=10,padT=10,padB=24, innerW=W-padL-padR, innerH=H-padT-padB, n=entries.length;
  const xFor = i=> n<=1 ? padL+innerW/2 : padL+(innerW*i/(n-1));
  const yFor = v=> padT+innerH-(Math.max(0,v)/maxV)*innerH;
  const toPath = series=>{ const pts=series.map((v,i)=> v==null?null:[xFor(i),yFor(v)]).filter(Boolean); if(!pts.length) return ''; return 'M '+pts.map(p=>p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' L '); };
  let svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">`;
  if(goalA) svg += `<line x1="${padL}" y1="${yFor(goalA)}" x2="${W-padR}" y2="${yFor(goalA)}" stroke="var(--plum)" stroke-dasharray="3,3" stroke-width="1"/>`;
  if(goalB) svg += `<line x1="${padL}" y1="${yFor(goalB)}" x2="${W-padR}" y2="${yFor(goalB)}" stroke="var(--steel)" stroke-dasharray="3,3" stroke-width="1"/>`;
  svg += `<path d="${toPath(seriesA)}" fill="none" stroke="var(--plum)" stroke-width="2.5"/>`;
  svg += `<path d="${toPath(seriesB)}" fill="none" stroke="var(--steel)" stroke-width="2.5"/>`;
  seriesA.forEach((v,i)=>{ if(v!=null) svg += `<circle cx="${xFor(i)}" cy="${yFor(v)}" r="3" fill="var(--plum)"/>`; });
  seriesB.forEach((v,i)=>{ if(v!=null) svg += `<circle cx="${xFor(i)}" cy="${yFor(v)}" r="3" fill="var(--steel)"/>`; });
  svg += `</svg>`;
  const chartDiv = document.createElement('div'); chartDiv.innerHTML = svg; card.appendChild(chartDiv);
  const legend = document.createElement('div'); legend.className='muted'; legend.style.display='flex'; legend.style.gap='14px'; legend.style.marginTop='6px';
  legend.innerHTML = `<span><span style="display:inline-block;width:10px;height:10px;background:var(--plum);border-radius:50%;margin-inline-end:4px;"></span>${STATE.profiles.A.name}</span>
    <span><span style="display:inline-block;width:10px;height:10px;background:var(--steel);border-radius:50%;margin-inline-end:4px;"></span>${STATE.profiles.B.name}</span>
    <span>מקווקו = היעד הנוכחי</span>`;
  card.appendChild(legend);
  return card;
}

function renderPrepChecklistCard(){
  const wrap = document.createElement('div');
  const agg = {}; // key: recipeId|who
  DAYS.forEach(day=>{
    MEALS.forEach(meal=>{
      const slot = computeSlot(day, meal);
      const who = slot.prep || 'together';
      ['A','B'].forEach(profile=>{
        const rid = effectiveRecipeId(slot, profile);
        if(!rid) return;
        const mult = effectiveMultiplier(slot, profile);
        const key = rid+'|'+who;
        if(!agg[key]) agg[key] = { recipeId:rid, who, totalMultiplier:0, slots:new Set() };
        agg[key].totalMultiplier += mult;
        agg[key].slots.add(day+'|'+meal);
      });
    });
  });

  const entries = Object.values(agg).filter(e=> recipeById(e.recipeId));
  if(entries.length===0){
    const empty = document.createElement('div'); empty.className='card empty'; empty.textContent='אין עדיין ארוחות מתוכננות לשבוע הזה.';
    wrap.appendChild(empty); return wrap;
  }

  const groupLabels = [['together','מכינים ביחד'],['A', STATE.profiles.A.name+' מכינה/ה'],['B', STATE.profiles.B.name+' מכין/ה']];
  groupLabels.forEach(([whoKey,label])=>{
    if(prepAssigneeFilter!=='all' && prepAssigneeFilter!=='together' && whoKey!=='together' && whoKey!==prepAssigneeFilter) return;
    const items = entries.filter(e=>e.who===whoKey).sort((a,b)=> recipeById(a.recipeId).name.localeCompare(recipeById(b.recipeId).name,'he'));
    if(items.length===0) return;
    const card = document.createElement('div'); card.className='card prep-group';
    const h = document.createElement('h4'); h.textContent=label; card.appendChild(h);
    items.forEach(entry=>{
      const r = recipeById(entry.recipeId);
      const doneKey = entry.recipeId+'|'+entry.who;
      const done = !!STATE.prepDone[doneKey];
      const timesText = entry.slots.size>1 ? `× ${entry.slots.size} ארוחות השבוע` : '× ארוחה אחת השבוע';

      const row = document.createElement('div'); row.className='prep-item'+(done?' done':'');
      const cb = document.createElement('input'); cb.type='checkbox'; cb.checked=done;
      cb.onclick = (e)=> e.stopPropagation();
      cb.onchange = ()=>{ STATE.prepDone[doneKey]=cb.checked; saveState(); render(); };
      row.appendChild(cb);

      const mid = document.createElement('div'); mid.style.flex='1'; mid.style.cursor='pointer';
      mid.innerHTML = `<div class="prep-item-title">${r.name}</div><div class="prep-item-meta">${timesText} · לחיצה לכמויות המדויקות</div>`;
      mid.onclick = ()=> openRecipeDetail(entry.recipeId, { multiplier: entry.totalMultiplier, label: timesText });
      row.appendChild(mid);
      const editBtn = document.createElement('button'); editBtn.className='icon-btn'; editBtn.style.width='38px'; editBtn.style.height='38px'; editBtn.style.fontSize='14px'; editBtn.textContent='✎'; editBtn.title='עריכת המתכון';
      editBtn.onclick = (e)=>{ e.stopPropagation(); startEditRecipe(r); };
      row.appendChild(editBtn);
      card.appendChild(row);
    });
    wrap.appendChild(card);
  });
  return wrap;
}

function renderGeminiTab(){
  const wrap = document.createElement('div');
  const keyCard = document.createElement('div'); keyCard.className='card';
  keyCard.innerHTML = '<label>מפתח Gemini API (משותף לשניכם)</label>';
  const keyInput = document.createElement('input'); keyInput.type='password'; keyInput.value=STATE.geminiKey||''; keyInput.placeholder='AIza...';
  keyInput.onchange = ()=>{ STATE.geminiKey=keyInput.value.trim(); saveState(); };
  keyCard.appendChild(keyInput);
  const keyNote = document.createElement('div'); keyNote.className='muted'; keyNote.style.marginTop='4px';
  keyNote.textContent = 'אפשר להשיג מפתח חינמי ב-Google AI Studio. גם מפעיל את הפענוח האוטומטי בטאב המתכונים.';
  keyCard.appendChild(keyNote);
  wrap.appendChild(keyCard);

  const chatCard = document.createElement('div'); chatCard.className='card';
  const h = document.createElement('h3'); h.textContent='התאמת מתכונים עם Gemini'; chatCard.appendChild(h);
  if(STATE.recipes.length){
    const quickWrap = document.createElement('div'); quickWrap.className='field'; quickWrap.innerHTML='<label>שליחת מתכון קיים להתאמה מהירה</label>';
    const sel = document.createElement('select');
    const none = document.createElement('option'); none.value=''; none.textContent='— בחירת מתכון —'; sel.appendChild(none);
    STATE.recipes.forEach(r=>{ const o=document.createElement('option'); o.value=r.id; o.textContent=r.name; sel.appendChild(o); });
    quickWrap.appendChild(sel);
    const goBtn = document.createElement('button'); goBtn.className='secondary'; goBtn.style.marginTop='6px'; goBtn.style.width='100%'; goBtn.textContent='הכניסי את המתכון לתיבת ההודעה';
    goBtn.onclick = ()=>{
      const r = STATE.recipes.find(x=>x.id===sel.value); if(!r) return;
      const ta = document.getElementById('gemini-input');
      const ings = (r.ingredients||[]).map(i=>`${i.name} — ${i.amount}${i.unit}`).join('\n');
      ta.value = `הנה מתכון בשם "${r.name}" (${totalServings(r).toFixed(1)} מנות):\n${ings}\n\nבקשה: `;
      ta.focus();
    };
    quickWrap.appendChild(goBtn);
    chatCard.appendChild(quickWrap);
  }
  const log = document.createElement('div'); log.className='gemini-log'; log.id='gemini-log';
  if(geminiHistory.length===0){
    log.innerHTML = '<div class="muted">עדיין אין שיחה. אפשר לשאול למשל: "מה אפשר להחליף בביצה במתכון הזה?"</div>';
  } else {
    geminiHistory.forEach(m=>{
      const div = document.createElement('div'); div.className='gemini-msg';
      div.innerHTML = `<b>${m.role==='user'?'את':'Gemini'}:</b><br>${escapeHtml(m.text)}`;
      log.appendChild(div);
    });
  }
  chatCard.appendChild(log);
  const inputRow = document.createElement('div'); inputRow.className='row';
  const ta = document.createElement('textarea'); ta.id='gemini-input'; ta.rows=3; ta.placeholder='כתבי הודעה ל-Gemini...';
  inputRow.appendChild(ta); chatCard.appendChild(inputRow);
  const sendBtn = document.createElement('button'); sendBtn.className='primary'; sendBtn.style.marginTop='8px'; sendBtn.style.width='100%'; sendBtn.textContent='שליחה';
  sendBtn.onclick = sendToGemini;
  chatCard.appendChild(sendBtn);
  wrap.appendChild(chatCard);
  return wrap;
}

function escapeHtml(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function sendToGemini(){
  const ta = document.getElementById('gemini-input');
  const text = ta.value.trim(); if(!text) return;
  if(!STATE.geminiKey){ alert('צריך להכניס קודם מפתח Gemini API למעלה.'); return; }
  geminiHistory.push({role:'user', text}); ta.value=''; render(); setTab('gemini');
  const log = document.getElementById('gemini-log');
  const loadingDiv = document.createElement('div'); loadingDiv.className='gemini-msg muted'; loadingDiv.textContent='Gemini חושבת...';
  log.appendChild(loadingDiv); log.scrollTop = log.scrollHeight;
  try{
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${encodeURIComponent(STATE.geminiKey)}`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({contents:[{parts:[{text}]}]})
    });
    const data = await res.json();
    let replyText = '(לא התקבלה תשובה)';
    if(data && data.candidates && data.candidates[0] && data.candidates[0].content) replyText = data.candidates[0].content.parts.map(p=>p.text).join('\n');
    else if(data && data.error) replyText = 'שגיאה: '+data.error.message;
    geminiHistory.push({role:'model', text:replyText});
  }catch(e){ geminiHistory.push({role:'model', text:'שגיאת רשת: '+e.message}); }
  render(); setTab('gemini');
}

/* ============================================================
   GOALS TAB
   ============================================================ */
function renderGoalsTab(){
  const wrap = document.createElement('div');
  ['A','B'].forEach(p=>{
    const card = document.createElement('div'); card.className='card';
    const h = document.createElement('h3'); h.textContent='פרופיל'; card.appendChild(h);
    const nameF = field('שם', {value:STATE.profiles[p].name, onInput:v=>{ STATE.profiles[p].name=v; saveState(); }});
    card.appendChild(nameF.wrap);
    const row = document.createElement('div'); row.className='row';
    [['calories','קלוריות יומיות'],['protein','חלבון (g)'],['fiber','סיבים (g)']].forEach(([key,label])=>{
      const f = field(label, {type:'number', value:STATE.profiles[p].goals[key], onInput:v=>{ STATE.profiles[p].goals[key]=Number(v)||0; saveState(); }});
      row.appendChild(f.wrap);
    });
    card.appendChild(row);
    wrap.appendChild(card);
  });
  return wrap;
}

boot();
